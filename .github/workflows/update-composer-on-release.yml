name: Atualizar Composer na Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  update-composer:
    name: Atualizar composer.json com versão da release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: composer:latest

      - name: Extrair versão da release
        id: version
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Atualizar composer.json
        run: |
          php -r "
          \$composer = json_decode(file_get_contents('composer.json'), true);
          \$composer['version'] = '${{ steps.version.outputs.version }}';
          file_put_contents('composer.json', json_encode(\$composer, JSON_UNESCAPED_SLASHES | JSON_PRETTY_PRINT) . PHP_EOL);
          "

      - name: Validar composer.json
        run: composer validate --quiet

      - name: Commit e push alterações
        run: |
          git config user.name "ScriptPlayerAgent"
          git config user.email "scriptPlayerAgent@felipecavalca.dev"
          git add composer.json
          git diff --quiet && git diff --staged --quiet || (
            git commit -m "Chore: Atualizar composer.json para versão ${{ steps.version.outputs.version }}"
            git push origin main
          )
