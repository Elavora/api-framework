name: Publicar no Composer e GitHub Packages

on:
  repository_dispatch:
    types: [tag-created]
  workflow_dispatch:
    inputs:
      tag:
        description: Tag existente que sera publicada
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  publish-release:
    name: Publicar elavora/api-framework
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.client_payload.tag || inputs.tag }}

      - name: Validar configuracao
        run: |
          test -f "composer.json" || {
            echo "::error::composer.json ausente"
            exit 1
          }

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer

      - name: Configurar credenciais GitHub Packages
        run: |
          composer config --global --auth github-oauth.github.com ${{ github.token }}

      - name: Publicar no GitHub Packages
        run: |
          composer publish
        continue-on-error: true

      - name: Notificar Packagist
        if: vars.PACKAGIST_WEBHOOK_URL != ''
        run: |
          curl -X POST "${{ vars.PACKAGIST_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{"repository":{"url":"https://github.com/Elavora/api-framework"}}'
        continue-on-error: true
